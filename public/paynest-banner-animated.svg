<svg width="760" height="220" viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PayNest — one nest for every payment you owe">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="0.55" stop-color="#120E29"/>
      <stop offset="1" stop-color="#1B1140"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="clipA">
      <rect x="190" y="108" width="0" height="28">
        <animate attributeName="width" calcMode="linear" keyTimes="0;0.15;0.40;0.50;1" values="0;300;300;0;0" dur="8s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clipB">
      <rect x="190" y="108" width="0" height="28">
        <animate attributeName="width" calcMode="linear" keyTimes="0;0.50;0.65;0.90;1" values="0;0;190;190;0" dur="8s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="760" height="220" rx="22" fill="url(#bgGrad)"/>
  <circle cx="90" cy="20" r="120" fill="#8B5CF6" opacity="0.10"/>
  <circle cx="700" cy="200" r="110" fill="#34D399" opacity="0.06"/>

  <!-- nest logo: draws in, then idles -->
  <g transform="translate(40,55) scale(1.55)">
    <path d="M6,38 Q6,53 32,53 Q58,53 58,38" pathLength="1" fill="none" stroke="#8B5CF6" stroke-width="3.4" stroke-linecap="round" stroke-dasharray="1" stroke-dashoffset="1">
      <animate attributeName="stroke-dashoffset" calcMode="linear" keyTimes="0;0.08;0.17;1" values="1;1;0;0" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M11,32 Q11,48 32,48 Q53,48 53,32" pathLength="1" fill="none" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-dasharray="1" stroke-dashoffset="1" opacity="0.6">
      <animate attributeName="stroke-dashoffset" calcMode="linear" keyTimes="0;0.10;0.19;1" values="1;1;0;0" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M16,27 Q16,43 32,43 Q48,43 48,27" pathLength="1" fill="none" stroke="#A78BFA" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="1" stroke-dashoffset="1" opacity="0.4">
      <animate attributeName="stroke-dashoffset" calcMode="linear" keyTimes="0;0.12;0.21;1" values="1;1;0;0" dur="8s" repeatCount="indefinite"/>
    </path>
    <g transform="translate(32,26) rotate(-6)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-2.2;0,0" keyTimes="0;0.5;1" dur="3.2s" repeatCount="indefinite"/>
        <rect x="-13" y="-9" width="26" height="18" rx="4" fill="#0A0E1A" stroke="#F1F5F9" stroke-width="2"/>
        <rect x="-13" y="-3.5" width="26" height="3.5" fill="#7C3AED"/>
        <circle cx="6" cy="5.5" r="2.2" fill="#34D399"/>
      </g>
    </g>
  </g>

  <!-- wordmark -->
  <text x="195" y="100" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#F1F5F9">PayNest</text>

  <!-- tagline: typewriter cycle between two lines -->
  <g clip-path="url(#clipA)">
    <text x="195" y="133" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#9AA3B8">One nest for every payment you owe.</text>
  </g>
  <g clip-path="url(#clipB)">
    <text x="195" y="133" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#9AA3B8">Stop chasing bills.</text>
  </g>

  <text x="195" y="163" font-family="Arial, Helvetica, sans-serif" font-size="10" letter-spacing="1" fill="#5b6580">BUILT BY DATACULES LLC</text>

  <!-- mini payment-health ring -->
  <g transform="translate(665,110)">
    <circle r="42" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="7"/>
    <circle r="42" fill="none" stroke="url(#ringGrad)" stroke-width="7" stroke-linecap="round" stroke-dasharray="263.9" stroke-dashoffset="263.9" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" calcMode="linear" keyTimes="0;0.5;0.7;1" values="263.9;34.3;34.3;263.9" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#F1F5F9">87</text>
    <text x="0" y="23" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" letter-spacing="1" fill="#9AA3B8">HEALTH</text>
  </g>
</svg>
