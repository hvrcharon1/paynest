name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package build output
        run: |
          cd dist
          zip -r ../paynest-${{ github.ref_name }}.zip .
          cd ..

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: PayNest ${{ github.ref_name }}
          generate_release_notes: true
          files: paynest-${{ github.ref_name }}.zip
